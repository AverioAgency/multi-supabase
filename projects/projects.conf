# Declares one self-hosted Supabase stack per line. install.sh reads this.
#
#   <stack>   short, unique, [a-z0-9-] — used for container names, volumes,
#             the stack dir (/opt/multi-supabase-stacks/<stack>) and Traefik
#             router names. NEVER reuse "supabase" (that's Koro's).
#   <db_host>     public host for the API gateway (Kong)  → https://<db_host>
#   <studio_host> public host for Supabase Studio (basic auth)
#
# Format (whitespace-separated):
#   <stack>  <db_host>  <studio_host>
#
# Add a project → append a line → re-run `sudo ./deploy/install.sh`.
# Existing stacks are detected and skipped (secrets reused), so re-running is
# safe and only brings up what's new. Koro is never touched.

munter   db.munter.app   studio.munter.app
axsuro   db.axsuro.com   studio.axsuro.com
